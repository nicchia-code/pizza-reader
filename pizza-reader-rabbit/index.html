<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff4df">
  <title>Pizza Reader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app" aria-live="polite">
    <header class="topbar">
      <p id="subtitle" class="subtitle">—</p>
      <button id="closeButton" class="small-button hidden" type="button">×</button>
    </header>

    <section id="readerView" class="reader hidden">
      <div id="chapterLabel" class="chapter-label">—</div>
      <div id="wordStage" class="word-stage" role="button" tabindex="0" aria-label="Parola corrente">
        <span id="wordBefore"></span><span id="pivot" class="pivot"></span><span id="wordAfter"></span>
      </div>
      <div class="progress-wrap" aria-label="Progresso capitolo">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <div class="status-row">
        <span id="statusText">Pausa</span>
        <span id="wpmText">220 wpm</span>
      </div>
      <div id="chapterEnd" class="chapter-end hidden">
        <strong>Fine capitolo</strong>
        <button id="nextChapterButton" type="button">Capitolo successivo</button>
      </div>
      <div class="touch-fallback">
        <button id="wpmDown" type="button">−</button>
        <button id="prevWord" type="button">←</button>
        <button id="playPause" type="button">▶</button>
        <button id="nextWord" type="button">→</button>
        <button id="wpmUp" type="button">+</button>
      </div>
    </section>

    <section id="emptyView" class="empty">
      <p>Nessun libro</p>
    </section>

    <section id="importView" class="importer hidden">
      <p id="scanInfo">Import…</p>
      <button id="cancelImportButton" type="button">Ok</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
